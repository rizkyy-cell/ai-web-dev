<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Glassmorphism</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            /* Efek Glassmorphism */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            font-size: 1.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        #hasil-ai {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            min-height: 80px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2>Asisten AI</h2>
        <input type="text" id="input-pesan" placeholder="Tanyakan sesuatu...">
        <button onclick="kirimPesan()">Kirim Pesan</button>
        <div id="hasil-ai">Jawaban akan muncul di sini...</div>
    </div>

    <!-- Panggil file JavaScript -->
    <script src="script.js"></script>
</body>
</html>

<script>
// Ganti tulisan TARUH_API_KEY_DI_SINI dengan API Key milikmu yang asli
const API_KEY = "AIzaSyDrUcac2_XSbJ9aabXVA3ya32eGMYn8JsA"; 

async function kirimPesan() {
    const inputPesan = document.getElementById("input-pesan").value;
    const divHasil = document.getElementById("hasil-ai");

    // Validasi sederhana: jangan kirim jika input kosong
    if (inputPesan.trim() === "") {
        divHasil.innerText = "Ketik pesan terlebih dahulu!";
        return;
    }

    // Menampilkan teks loading saat menunggu balasan
    divHasil.innerText = "Sedang berpikir...";

    // Link endpoint resmi dari Gemini API
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: inputPesan }]
                }]
            })
        });

        const data = await response.json();
        
        // Mengambil teks balasan dari struktur data JSON yang dikirim Gemini
        const jawabanAI = data.candidates[0].content.parts[0].text;
        
        // Menampilkan jawaban ke layar
        divHasil.innerText = jawabanAI;

    } catch (error) {
        console.error("Error:", error);
        divHasil.innerText = "Maaf, terjadi kesalahan saat menghubungi AI. Periksa koneksi atau API Key kamu.";
    }
}

</script
</body>
</html>
