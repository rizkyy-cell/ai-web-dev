<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Gemini</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:15px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:#1e293b;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    .header{
      background:#2563eb;
      padding:20px;
      text-align:center;
      font-size:24px;
      font-weight:bold;
    }

    .chat-box{
      height:500px;
      overflow-y:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:15px;
      background:#0f172a;
    }

    .message{
      padding:12px 15px;
      border-radius:15px;
      max-width:80%;
      line-height:1.5;
      word-wrap:break-word;
    }

    .user{
      align-self:flex-end;
      background:#2563eb;
    }

    .bot{
      align-self:flex-start;
      background:#374151;
    }

    .input-area{
      display:flex;
      gap:10px;
      padding:15px;
      background:#111827;
    }

    .input-area input{
      flex:1;
      padding:14px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#374151;
      color:white;
    }

    .input-area button{
      padding:14px 20px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .input-area button:hover{
      background:#1d4ed8;
    }

    .api-box{
      padding:15px;
      background:#111827;
    }

    .api-box input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#374151;
      color:white;
      outline:none;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    AI Chat Gemini
  </div>

  <div class="api-box">
    <input 
      type="password" 
      id="apiKey"
      placeholder="AIzaSyDrUcac2_XSbJ9aabXVA3ya32eGMYn8JsA">
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input 
      type="text" 
      id="userInput" 
      placeholder="Tulis pesan...">

    <button onclick="sendMessage()">
      Kirim
    </button>
  </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");

function addMessage(text, sender){

  const div = document.createElement("div");

  div.classList.add("message");
  div.classList.add(sender);

  div.innerText = text;

  chatBox.appendChild(div);

  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

  const apiKey = document.getElementById("apiKey").value;

  const message = userInput.value.trim();

  if(!apiKey){
    alert("Masukkan API Key dulu");
    return;
  }

  if(!message){
    return;
  }

  addMessage(message, "user");

  userInput.value = "";

  addMessage("Mengetik...", "bot");

  try{

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          contents:[
            {
              parts:[
                {
                  text: message
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();

    document.querySelector(".bot:last-child").remove();

    const aiText =
      data.candidates[0].content.parts[0].text;

    addMessage(aiText, "bot");

  }catch(error){

    document.querySelector(".bot:last-child").remove();

    addMessage(
      "Error: " + error.message,
      "bot"
    );
  }
}

userInput.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    sendMessage();
  }

});

</script>

</body>
</html>
