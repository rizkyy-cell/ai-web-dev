<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uji Coba Lottie Tencent - Kyy</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0; background-color: #0e1621; color: #fff;
            font-family: sans-serif; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .info-box { text-align: center; max-width: 80%; pointer-events: none; }
        h2 { color: #3390ec; margin-bottom: 5px; }
        p { color: #7f91a4; font-size: 14px; }

        /* KONTAINER MASKOT */
        #kyyTencentBot {
            position: fixed;
            bottom: 95px; /* Posisi mendarat */
            right: 20px;
            width: 90px;
            height: 90px;
            z-index: 9999;
            cursor: grab;
            touch-action: none; /* Anti scroll saat ditarik */
            filter: drop-shadow(-4px 6px 8px rgba(0,0,0,0.4));
        }
        #kyyTencentBot:active { cursor: grabbing; }

        #lottieContainer { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="info-box">
        <h2>Uji Coba Fisika Lottie</h2>
        <p>Jika layar masih blank di Acode, upload file ini ke Vercel agar file JSON tidak diblokir oleh keamanan lokal (CORS).</p>
    </div>

    <div id="kyyTencentBot">
        <div id="lottieContainer"></div>
    </div>

    <script>
        const robotElement = document.getElementById('kyyTencentBot');
        const containerAnimasi = document.getElementById('lottieContainer');

        // URL ANIMASI LOTTIE (Gunakan link yang stabil dari lottie.host)
        const URL_IDLE = "https://lottie.host/dd595d2d-6bb0-4d56-a492-567c9c6f2a68/Zp2XUqE6Vq.json"; 
        const URL_PANIK = "https://lottie.host/81f421f1-3213-4428-ba20-2ef64d1f2a96/1J9vW0MvX2.json"; 

        const defaultRight = 20;
        const defaultBottom = 95;

        let animInstance = null;
        let isDragging = false;
        let startX = 0, startY = 0;
        let elStartX = 0, elStartY = 0;

        // FUNGSI RENDER LOTTIE INSTAN
        function loadRobotAnimation(urlJson) {
            if (animInstance) animInstance.destroy();
            animInstance = lottie.loadAnimation({
                container: containerAnimasi,
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: urlJson
            });
        }

        // Mulai dengan posisi tenang
        loadRobotAnimation(URL_IDLE);

        // 1. SAAT DISENTUH (DRAG START)
        robotElement.addEventListener('touchstart', (e) => {
            isDragging = true;
            robotElement.style.transition = 'none';
            robotElement.style.transform = 'scale(1.08)'; 
            
            const touch = e.touches[0];
            const rect = robotElement.getBoundingClientRect();
            
            startX = touch.clientX; startY = touch.clientY;
            elStartX = rect.left; elStartY = rect.top;

            // Tukar animasi ke mode Panik saat dipegang
            loadRobotAnimation(URL_PANIK);
        }, { passive: true });

        // 2. SAAT DISERET (DRAG MOVE)
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            
            let newLeft = elStartX + (touch.clientX - startX);
            let newTop = elStartY + (touch.clientY - startY);

            if (newLeft < 5) newLeft = 5; if (newTop < 5) newTop = 5;
            if (newLeft > window.innerWidth - robotElement.offsetWidth - 5) newLeft = window.innerWidth - robotElement.offsetWidth - 5;
            if (newTop > window.innerHeight - robotElement.offsetHeight - 5) newTop = window.innerHeight - robotElement.offsetHeight - 5;

            robotElement.style.left = newLeft + 'px';
            robotElement.style.top = newTop + 'px';
            robotElement.style.bottom = 'auto';
            robotElement.style.right = 'auto';
        }, { passive: false });

        // 3. SAAT DILEPAS (JATUH BEBAS)
        document.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            robotElement.style.transform = 'scale(1)';

            // Transisi meluncur (Gravity snap-back)
            robotElement.style.transition = 'left 0.55s cubic-bezier(0.25, 1, 0.5, 1), top 0.55s cubic-bezier(0.25, 1, 0.5, 1)';

            const landLeft = window.innerWidth - robotElement.offsetWidth - defaultRight;
            const landTop = window.innerHeight - robotElement.offsetHeight - defaultBottom;

            robotElement.style.left = landLeft + 'px';
            robotElement.style.top = landTop + 'px';

            // Kembali ke animasi Idle saat mendarat
            setTimeout(() => {
                if (!isDragging) {
                    robotElement.style.transition = '';
                    robotElement.style.left = 'auto'; robotElement.style.top = 'auto';
                    robotElement.style.right = defaultRight + 'px';
                    robotElement.style.bottom = defaultBottom + 'px';
                    loadRobotAnimation(URL_IDLE);
                }
            }, 550);
        });
    </script>
</body>
</html>
